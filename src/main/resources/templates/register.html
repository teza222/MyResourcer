<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout}">
<head>
    <title>Register - MyResourcer</title>
</head>
<div th:fragment="content">
    <div class="row justify-content-center mt-4">
        <div class="col-md-7">
            <div class="card shadow-sm border-0">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-person-plus text-primary" style="font-size: 3rem;"></i>
                        <h2 class="fw-bold mt-2">Register</h2>
                        <p class="text-muted">Join the MyResourcer management system</p>
                    </div>

                    <form th:action="@{/register}" method="post">
                        <div class="row g-3">
                            <!-- First Name -->
                            <div class="col-md-6 mb-3">
                                <label for="fname" class="form-label">First Name</label>
                                <input type="text" class="form-control bg-light" id="fname" name="fname" placeholder="Enter first name" required>
                            </div>
                            <!-- Last Name -->
                            <div class="col-md-6 mb-3">
                                <label for="lname" class="form-label">Last Name</label>
                                <input type="text" class="form-control bg-light" id="lname" name="lname" placeholder="Enter last name" required>
                            </div>
                        </div>

                        <div class="row g-3">
                            <!-- Username -->
                            <div class="col-md-6 mb-3">
                                <label for="username" class="form-label">Username</label>
                                <input type="text" class="form-control bg-light" id="username" name="username" placeholder="Enter username" required>
                            </div>
                            <!-- Password -->
                            <div class="col-md-6 mb-3">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" class="form-control bg-light" id="password" name="password" placeholder="Enter password" required>
                            </div>
                        </div>

                        <div class="row g-3">
                            <!-- Role Dropdown -->
                            <div class="col-md-6 mb-3">
                                <label for="role" class="form-label">Role</label>
                                <select class="form-select bg-light" id="role" name="roleId" required>
                                    <option value="" disabled selected>Select your role</option>
                                    <option th:each="role : ${roles}" th:value="${role.roleId}" th:text="${role.roleName}"></option>
                                </select>
                            </div>
                            <!-- Department Dropdown -->
                            <div class="col-md-6 mb-3">
                                <label for="department" class="form-label">Department</label>
                                <select class="form-select bg-light" id="department" name="departmentId" required>
                                    <option value="" disabled selected>Select your department</option>
                                    <option th:each="dept : ${departments}" th:value="${dept.departmentId}" th:text="${dept.departmentName}"></option>
                                </select>
                            </div>
                        </div>

                        <div class="mt-4">
                            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Sign Up</button>
                        </div>
                    </form>

                    <hr class="my-4">

                    <div class="text-center">
                        <p class="mb-0">Already have an account?</p>
                        <a href="/login" class="text-primary text-decoration-none fw-bold">Login here</a>
                    </div>
                </div>
            </div>
            <div class="text-center mt-4">
                <a href="/" class="text-muted text-decoration-none small"><i class="bi bi-arrow-left me-1"></i> Back to Home</a>
            </div>
        </div>
    </div>
</div>
</html>
