<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout}">
<head>
    <title>User Dashboard - MyResourcer</title>
</head>
<div th:fragment="content">
    <div class="container-fluid">
        <h2 class="fw-bold text-dark mb-0 pb-4"><i class="bi bi-house-door"></i> DashBoard</h2>

        <!-- Alert Messages -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show mb-4" role="alert">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show mb-4" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="row">
            <!-- User Information Card -->
            <div class="col-md-4">
                <div class="card shadow-sm user-card mb-4">
                    <div class="card-body p-4">
                        <h4 class="card-title fw-bold mb-4 text-primary"><i class="bi bi-person-circle me-2"></i> Profile</h4>
                        <div class="mb-3 d-flex justify-content-between border-bottom pb-2">
                            <span class="text-muted small text-uppercase fw-bold">First Name</span>
                            <span class="fw-bold" th:text="${user.fname}"></span>
                        </div>
                        <div class="mb-3 d-flex justify-content-between border-bottom pb-2">
                            <span class="text-muted small text-uppercase fw-bold">Last Name</span>
                            <span class="fw-bold" th:text="${user.lname}"></span>
                        </div>
                        <div class="mb-3 d-flex justify-content-between border-bottom pb-2">
                            <span class="text-muted small text-uppercase fw-bold">Username</span>
                            <span class="fw-bold" th:text="${user.username}"></span>
                        </div>
                        <div class="mb-3 d-flex justify-content-between border-bottom pb-2">
                            <span class="text-muted small text-uppercase fw-bold">Department</span>
                            <span class="fw-bold" th:text="${user.departmentId.departmentName}"></span>
                        </div>
                        <div class="mb-0 d-flex justify-content-between">
                            <span class="text-muted small text-uppercase fw-bold">Role</span>
                            <span class="badge bg-primary rounded-pill" th:text="${user.roleId.roleName}"></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Request History Section -->
            <div class="col-md-8">
                <div class="card shadow-sm border-0 rounded-3">
                    <div class="card-body p-4">
                        <h4 class="card-title fw-bold mb-4 text-primary"><i class="bi bi-history me-2"></i> Request History</h4>
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th class="border-0">Requested</th>
                                        <th class="border-0">Status</th>
                                        <th class="border-0">Date Out</th>
                                        <th class="border-0">Time Out</th>
                                        <th class="border-0">Date In</th>
                                        <th class="border-0">Time In</th>
                                        <th class="border-0 text-center">Actions</th>
                                    </tr>
                                </thead>
                                <tbody class="border-top-0">
                                    <tr th:each="request : ${requests}">
                                        <td class="fw-bold" th:text="${request.assetId.item}"></td>
                                        <td>
                                            <span class="badge px-3 py-2 rounded-pill"
                                                  th:classappend="${request.statusId.statusName == 'Approved' ? 'bg-success-subtle text-success border border-success' : (request.statusId.statusName == 'Canceled' ? 'bg-danger-subtle text-danger border border-danger' : 'bg-warning-subtle text-warning border border-warning')}"
                                                  th:text="${request.statusId.statusName}"></span>
                                        </td>
                                        <td th:text="${request.dateOut}"></td>
                                        <td th:text="${request.timeOut}"></td>
                                        <td th:text="${request.dateIn}"></td>
                                        <td th:text="${request.timeIn}"></td>
                                        <td class="text-center">
                                            <form th:if="${request.statusId.statusName == 'Pending'}" th:action="@{/dashboard/cancel-request}" method="post" onsubmit="return confirm('Are you sure you want to cancel this request?');">
                                                <input type="hidden" name="requestId" th:value="${request.requestId}" />
                                                <button type="submit" class="btn btn-sm btn-outline-danger">
                                                    <i class="bi bi-x-circle me-1"></i> Cancel
                                                </button>
                                            </form>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(requests)}">
                                        <td colspan="7" class="text-center py-5 text-muted">
                                            <i class="bi bi-inbox fs-1 d-block mb-3 opacity-25"></i>
                                            No request history found.
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</html>
