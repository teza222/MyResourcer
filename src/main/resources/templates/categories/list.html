<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Categories</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h1>Categories</h1>
    <a th:href="@{/web/categories/add}" class="btn btn-primary mb-3">Add Category</a>
    <table class="table table-bordered">
        <thead>
        <th>ID</th><th>Category Name</th><th>Actions</th> </thead>
        <tbody>
        <tr th:each="cat : ${categories}">
            <td th:text="${cat.categoryId}">1</td>
            <td th:text="${cat.categoryName}">Electronics</td>
            <td>
                <a th:href="@{/web/categories/edit/{id}(id=${cat.categoryId})}" class="btn btn-sm btn-warning">Edit</a>
                <a th:href="@{/web/categories/delete/{id}(id=${cat.categoryId})}" class="btn btn-sm btn-danger" onclick="return confirm('Delete this category?')">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
