<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout}">
<head>
    <title>Manage Organization Settings - MyResourcer</title>
</head>
<div th:fragment="content">
    <div class="container-fluid">
        <h2 class="fw-bold text-dark mb-4"><i class="bi bi-gear me-2"></i> Organization Settings</h2>

        <!-- Alert Messages -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show mb-4" role="alert">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show mb-4" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="row g-4">
            <!-- Departments Section -->
            <div class="col-md-6">
                <div class="card shadow-sm border-0 rounded-3 h-100">
                    <div class="card-header bg-white border-0 p-4 d-flex justify-content-between align-items-center">
                        <h5 class="fw-bold mb-0"><i class="bi bi-building me-2 text-primary"></i> Departments</h5>
                        <button class="btn btn-sm btn-primary" data-bs-toggle="modal" data-bs-target="#addDepartmentModal">
                            <i class="bi bi-plus-lg"></i>
                        </button>
                    </div>
                    <div class="card-body px-4 pb-4 pt-0">
                        <div class="table-responsive" style="max-height: 300px;">
                            <table class="table table-hover align-middle small">
                                <tbody class="border-top-0">
                                    <tr th:each="dept : ${departments}">
                                        <td th:text="${dept.departmentName}"></td>
                                        <td class="text-end">
                                            <button th:if="${usedDepartmentIds.contains(dept.departmentId)}" class="btn btn-sm p-0 text-muted" disabled title="In use"><i class="bi bi-trash"></i></button>
                                            <button th:unless="${usedDepartmentIds.contains(dept.departmentId)}" class="btn btn-sm p-0 text-danger" data-bs-toggle="modal" th:data-bs-target="'#deleteDept' + ${dept.departmentId}"><i class="bi bi-trash"></i></button>

                                            <div th:unless="${usedDepartmentIds.contains(dept.departmentId)}" class="modal fade" th:id="'deleteDept' + ${dept.departmentId}" tabindex="-1" aria-hidden="true">
                                                <div class="modal-dialog modal-sm">
                                                    <div class="modal-content border-0 shadow">
                                                        <div class="modal-body p-4 text-center">
                                                            <p class="mb-4 text-start small">Delete department <strong>[[${dept.departmentName}]]</strong>?</p>
                                                            <form th:action="@{/admin/delete-department}" method="post">
                                                                <input type="hidden" name="departmentId" th:value="${dept.departmentId}">
                                                                <button type="submit" class="btn btn-sm btn-danger px-3">Delete</button>
                                                                <button type="button" class="btn btn-sm btn-light" data-bs-dismiss="modal">Cancel</button>
                                                            </form>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Roles Section -->
            <div class="col-md-6">
                <div class="card shadow-sm border-0 rounded-3 h-100">
                    <div class="card-header bg-white border-0 p-4 d-flex justify-content-between align-items-center">
                        <h5 class="fw-bold mb-0"><i class="bi bi-person-badge me-2 text-success"></i> Roles</h5>
                        <button class="btn btn-sm btn-success" data-bs-toggle="modal" data-bs-target="#addRoleModal">
                            <i class="bi bi-plus-lg"></i>
                        </button>
                    </div>
                    <div class="card-body px-4 pb-4 pt-0">
                        <div class="table-responsive" style="max-height: 300px;">
                            <table class="table table-hover align-middle small">
                                <tbody class="border-top-0">
                                    <tr th:each="role : ${roles}">
                                        <td th:text="${role.roleName}"></td>
                                        <td class="text-end">
                                            <button th:if="${usedRoleIds.contains(role.roleId)}" class="btn btn-sm p-0 text-muted" disabled title="In use"><i class="bi bi-trash"></i></button>
                                            <button th:unless="${usedRoleIds.contains(role.roleId)}" class="btn btn-sm p-0 text-danger" data-bs-toggle="modal" th:data-bs-target="'#deleteRole' + ${role.roleId}"><i class="bi bi-trash"></i></button>

                                            <div th:unless="${usedRoleIds.contains(role.roleId)}" class="modal fade" th:id="'deleteRole' + ${role.roleId}" tabindex="-1" aria-hidden="true">
                                                <div class="modal-dialog modal-sm">
                                                    <div class="modal-content border-0 shadow">
                                                        <div class="modal-body p-4 text-center">
                                                            <p class="mb-4 text-start small">Delete role <strong>[[${role.roleName}]]</strong>?</p>
                                                            <form th:action="@{/admin/delete-role}" method="post">
                                                                <input type="hidden" name="roleId" th:value="${role.roleId}">
                                                                <button type="submit" class="btn btn-sm btn-danger px-3">Delete</button>
                                                                <button type="button" class="btn btn-sm btn-light" data-bs-dismiss="modal">Cancel</button>
                                                            </form>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Statuses Section -->
            <div class="col-md-6">
                <div class="card shadow-sm border-0 rounded-3 h-100">
                    <div class="card-header bg-white border-0 p-4 d-flex justify-content-between align-items-center">
                        <h5 class="fw-bold mb-0"><i class="bi bi-info-circle me-2 text-info"></i> Statuses</h5>
                        <button class="btn btn-sm btn-info text-white" data-bs-toggle="modal" data-bs-target="#addStatusModal">
                            <i class="bi bi-plus-lg"></i>
                        </button>
                    </div>
                    <div class="card-body px-4 pb-4 pt-0">
                        <div class="table-responsive" style="max-height: 300px;">
                            <table class="table table-hover align-middle small">
                                <tbody class="border-top-0">
                                    <tr th:each="s : ${statuses}">
                                        <td th:text="${s.statusName}"></td>
                                        <td class="text-end">
                                            <button th:if="${usedStatusIds.contains(s.statusId)}" class="btn btn-sm p-0 text-muted" disabled title="In use"><i class="bi bi-trash"></i></button>
                                            <button th:unless="${usedStatusIds.contains(s.statusId)}" class="btn btn-sm p-0 text-danger" data-bs-toggle="modal" th:data-bs-target="'#deleteStatus' + ${s.statusId}"><i class="bi bi-trash"></i></button>

                                            <div th:unless="${usedStatusIds.contains(s.statusId)}" class="modal fade" th:id="'deleteStatus' + ${s.statusId}" tabindex="-1" aria-hidden="true">
                                                <div class="modal-dialog modal-sm">
                                                    <div class="modal-content border-0 shadow">
                                                        <div class="modal-body p-4 text-center">
                                                            <p class="mb-4 text-start small">Delete status <strong>[[${s.statusName}]]</strong>?</p>
                                                            <form th:action="@{/admin/delete-status}" method="post">
                                                                <input type="hidden" name="statusId" th:value="${s.statusId}">
                                                                <button type="submit" class="btn btn-sm btn-danger px-3">Delete</button>
                                                                <button type="button" class="btn btn-sm btn-light" data-bs-dismiss="modal">Cancel</button>
                                                            </form>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Conditions Section -->
            <div class="col-md-6">
                <div class="card shadow-sm border-0 rounded-3 h-100">
                    <div class="card-header bg-white border-0 p-4 d-flex justify-content-between align-items-center">
                        <h5 class="fw-bold mb-0"><i class="bi bi-shield-check me-2 text-warning"></i> Conditions</h5>
                        <button class="btn btn-sm btn-warning text-white" data-bs-toggle="modal" data-bs-target="#addConditionModal">
                            <i class="bi bi-plus-lg"></i>
                        </button>
                    </div>
                    <div class="card-body px-4 pb-4 pt-0">
                        <div class="table-responsive" style="max-height: 300px;">
                            <table class="table table-hover align-middle small">
                                <tbody class="border-top-0">
                                    <tr th:each="c : ${conditions}">
                                        <td th:text="${c.conditionName}"></td>
                                        <td class="text-end">
                                            <button th:if="${usedConditionIds.contains(c.conditionId)}" class="btn btn-sm p-0 text-muted" disabled title="In use"><i class="bi bi-trash"></i></button>
                                            <button th:unless="${usedConditionIds.contains(c.conditionId)}" class="btn btn-sm p-0 text-danger" data-bs-toggle="modal" th:data-bs-target="'#deleteCondition' + ${c.conditionId}"><i class="bi bi-trash"></i></button>

                                            <div th:unless="${usedConditionIds.contains(c.conditionId)}" class="modal fade" th:id="'deleteCondition' + ${c.conditionId}" tabindex="-1" aria-hidden="true">
                                                <div class="modal-dialog modal-sm">
                                                    <div class="modal-content border-0 shadow">
                                                        <div class="modal-body p-4 text-center">
                                                            <p class="mb-4 text-start small">Delete condition <strong>[[${c.conditionName}]]</strong>?</p>
                                                            <form th:action="@{/admin/delete-condition}" method="post">
                                                                <input type="hidden" name="conditionId" th:value="${c.conditionId}">
                                                                <button type="submit" class="btn btn-sm btn-danger px-3">Delete</button>
                                                                <button type="button" class="btn btn-sm btn-light" data-bs-dismiss="modal">Cancel</button>
                                                            </form>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div class="modal fade" id="addDepartmentModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog"><div class="modal-content border-0 shadow">
            <div class="modal-header bg-primary text-white border-0"><h5 class="modal-title fw-bold">Add Department</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
            <form th:action="@{/admin/add-department}" method="post"><div class="modal-body p-4"><input type="text" class="form-control" name="departmentName" required placeholder="Name"></div><div class="modal-footer border-0"><button type="submit" class="btn btn-primary">Create</button></div></form>
        </div></div>
    </div>
    <div class="modal fade" id="addRoleModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog"><div class="modal-content border-0 shadow">
            <div class="modal-header bg-success text-white border-0"><h5 class="modal-title fw-bold">Add Role</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
            <form th:action="@{/admin/add-role}" method="post"><div class="modal-body p-4"><input type="text" class="form-control" name="roleName" required placeholder="Name"></div><div class="modal-footer border-0"><button type="submit" class="btn btn-success">Create</button></div></form>
        </div></div>
    </div>
    <div class="modal fade" id="addStatusModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog"><div class="modal-content border-0 shadow">
            <div class="modal-header bg-info text-white border-0"><h5 class="modal-title fw-bold">Add Status</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
            <form th:action="@{/admin/add-status}" method="post"><div class="modal-body p-4"><input type="text" class="form-control" name="statusName" required placeholder="Name"></div><div class="modal-footer border-0"><button type="submit" class="btn btn-info text-white">Create</button></div></form>
        </div></div>
    </div>
    <div class="modal fade" id="addConditionModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog"><div class="modal-content border-0 shadow">
            <div class="modal-header bg-warning text-white border-0"><h5 class="modal-title fw-bold">Add Condition</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
            <form th:action="@{/admin/add-condition}" method="post"><div class="modal-body p-4"><input type="text" class="form-control" name="conditionName" required placeholder="Name"></div><div class="modal-footer border-0"><button type="submit" class="btn btn-warning text-white">Create</button></div></form>
        </div></div>
    </div>
</div>
</html>
