<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout}">
<head>
    <title>Forgot Password - MyResourcer</title>
</head>
<div th:fragment="content">
    <div class="row justify-content-center mt-5">
        <div class="col-md-5">
            <div class="card shadow-sm border-0">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-key text-primary" style="font-size: 4rem;"></i>
                        <h2 class="fw-bold mt-2">Forgot Password</h2>
                        <p class="text-muted">Enter your email to receive a reset link</p>
                    </div>

                    <form th:action="@{/forgot-password}" method="post">
                        <div class="mb-4">
                            <label for="email" class="form-label">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope"></i></span>
                                <input type="email" class="form-control border-start-0 bg-light" id="email" name="email" placeholder="Enter your email" required autofocus>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Send Reset Link</button>
                    </form>

                    <hr class="my-4">

                    <div class="text-center">
                        <p class="mb-0">Remembered your password?</p>
                        <a href="/login" class="text-primary text-decoration-none fw-bold">Login here</a>
                    </div>
                </div>
            </div>
            <div class="text-center mt-4">
                <a href="/" class="text-muted text-decoration-none small"><i class="bi bi-arrow-left me-1"></i> Back to Home</a>
            </div>
        </div>
    </div>
</div>
</html>
